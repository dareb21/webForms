version: '3'

services:
  app:
    image: dareb21/eval-doc
    container_name: laravel_prod_app
    restart: always

    volumes:
      
      - ./storage_prod:/var/www/storage
      
      - public_assets:/var/www/public
      - ./.env:/var/www/html/.env

  webserver:
    image: nginx:alpine
    container_name: laravel_prod_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf
      
      - public_assets:/var/www/public
      
      - ./storage_prod:/var/www/storage/app/public
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: laravel_prod_db
    restart: always
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_prod_data:/var/lib/mysql

  # CORRECCIÓN: Redis ahora está indentado dentro de services
  redis:
    image: redis:alpine
    container_name: laravel_prod_redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
       - redis_prod_data:/data

volumes:
  db_prod_data:
  redis_prod_data:
  public_assets: # El volumen mágico para compartir CSS/JS